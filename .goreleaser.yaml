version: 2

snapshot:
  version_template: '0~{{ .ShortCommit }}'

builds:
  - id: a2ald
    main: ./cmd/a2ald
    binary: a2ald
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: a2al
    main: ./cmd/a2al
    binary: a2al
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - ids: [a2ald, a2al]
    name_template: "a2al_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

nfpms:
  - id: a2al-pkg
    package_name: a2al
    ids: [a2ald, a2al]
    vendor: A2AL Authors
    homepage: https://a2al.org
    maintainer: A2AL Authors <noreply@github.com>
    description: A2AL — decentralized agent networking (daemon + CLI)
    license: MPL-2.0

    formats: [deb, rpm]
    bindir: /opt/a2al/bin

    contents:
      - src: deploy/linux/a2ald.service
        dst: /etc/systemd/system/a2ald.service
        file_info:
          mode: 0644
      - src: /opt/a2al/bin/a2ald
        dst: /usr/local/bin/a2ald
        type: symlink
      - src: /opt/a2al/bin/a2al
        dst: /usr/local/bin/a2al
        type: symlink

    scripts:
      postinstall: deploy/linux/postinst
      postremove: deploy/linux/postrm

    file_name_template: "a2al_{{ .Version }}_{{ .Arch }}"

    overrides:
      rpm:
        file_name_template: "a2al-{{ .Version }}-1.{{ .Arch }}"
        dependencies:
          - systemd

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
