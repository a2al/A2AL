name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — build only, skip publish'
        type: boolean
        default: true

# Dry run is active when:
#   - triggered manually with dry_run=true (default)
#   - tag name ends with '-test' (e.g. v0.1.0-test)
# Dry run: goreleaser builds with --snapshot, publish jobs are skipped.

permissions:
  contents: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go test -vet=off -count=1 ./...
        env:
          CGO_ENABLED: "0"

  release:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: ${{ (endsWith(github.ref_name, '-test') || inputs.dry_run == true) && 'release --snapshot --clean' || 'release --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    runs-on: ubuntu-latest
    needs: release
    if: ${{ !endsWith(github.ref_name, '-test') && inputs.dry_run != true }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download and unpack release binaries
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"

          unpack_tar() {
            local PLAT="$1" ASSET="$2"
            mkdir -p "npm/platform/${PLAT}/bin"
            curl -fsSL "${BASE}/a2al_${VERSION}_${ASSET}.tar.gz" \
              | tar xz -C "npm/platform/${PLAT}/bin/" a2ald
            chmod +x "npm/platform/${PLAT}/bin/a2ald"
          }

          unpack_tar linux-x64    linux_amd64
          unpack_tar linux-arm64  linux_arm64
          unpack_tar darwin-x64   darwin_amd64
          unpack_tar darwin-arm64 darwin_arm64

          mkdir -p npm/platform/win32-x64/bin
          curl -fsSL "${BASE}/a2al_${VERSION}_windows_amd64.zip" -o /tmp/win.zip
          unzip -j /tmp/win.zip '*/a2ald.exe' -d npm/platform/win32-x64/bin/

      - name: Set versions
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for PKG_DIR in \
            npm/platform/linux-x64 \
            npm/platform/linux-arm64 \
            npm/platform/darwin-x64 \
            npm/platform/darwin-arm64 \
            npm/platform/win32-x64 \
            npm/a2ald; do
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('${PKG_DIR}/package.json', 'utf8'));
              p.version = '${VERSION}';
              if (p.optionalDependencies) {
                for (const k of Object.keys(p.optionalDependencies)) {
                  p.optionalDependencies[k] = '${VERSION}';
                }
              }
              fs.writeFileSync('${PKG_DIR}/package.json', JSON.stringify(p, null, 2) + '\n');
            "
          done

      - name: Publish platform packages
        run: |
          for PLAT in linux-x64 linux-arm64 darwin-x64 darwin-arm64 win32-x64; do
            cd "npm/platform/${PLAT}"
            npm publish --access public
            cd "../../.."
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: |
          cd npm/a2ald
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    runs-on: ubuntu-latest
    needs: release
    if: ${{ !endsWith(github.ref_name, '-test') && inputs.dry_run != true }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build wheel twine

      - name: Build and publish platform wheels
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"

          cd python
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml
          mkdir -p src/a2al/bin

          for ENTRY in \
            "linux_amd64:manylinux2014_x86_64" \
            "linux_arm64:manylinux2014_aarch64" \
            "darwin_amd64:macosx_11_0_x86_64" \
            "darwin_arm64:macosx_11_0_arm64"; do
            ASSET="${ENTRY%%:*}"
            PLAT="${ENTRY##*:}"

            rm -f src/a2al/bin/a2ald
            curl -fsSL "${BASE}/a2al_${VERSION}_${ASSET}.tar.gz" \
              | tar xz -C src/a2al/bin/ a2ald
            chmod +x src/a2al/bin/a2ald

            python -m build --wheel --outdir dist/
            wheel tags --python-tag py3 --abi-tag none \
              --platform-tag "${PLAT}" --remove dist/a2al-*.whl
            twine upload dist/a2al-*.whl
            rm dist/a2al-*.whl
          done

          # Windows
          rm -f src/a2al/bin/a2ald
          curl -fsSL "${BASE}/a2al_${VERSION}_windows_amd64.zip" -o /tmp/win.zip
          unzip -j /tmp/win.zip '*/a2ald.exe' -d src/a2al/bin/
          python -m build --wheel --outdir dist/
          wheel tags --python-tag py3 --abi-tag none \
            --platform-tag win_amd64 --remove dist/a2al-*.whl
          twine upload dist/a2al-*.whl
          rm dist/a2al-*.whl

          # Source distribution (no binary, fallback for unsupported platforms)
          rm -f src/a2al/bin/a2ald src/a2al/bin/a2ald.exe
          python -m build --sdist --outdir dist/
          twine upload dist/a2al-*.tar.gz
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

