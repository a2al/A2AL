name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go test -vet=off -count=1 ./...
        env:
          CGO_ENABLED: "0"

  release:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download and unpack release binaries
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"

          unpack_tar() {
            local PLAT="$1" ASSET="$2"
            mkdir -p "npm/platform/${PLAT}/bin"
            curl -fsSL "${BASE}/a2ald_${VERSION}_${ASSET}.tar.gz" \
              | tar xz -C "npm/platform/${PLAT}/bin/" a2ald
            chmod +x "npm/platform/${PLAT}/bin/a2ald"
          }

          unpack_tar linux-x64    linux_amd64
          unpack_tar linux-arm64  linux_arm64
          unpack_tar darwin-x64   darwin_amd64
          unpack_tar darwin-arm64 darwin_arm64

          mkdir -p npm/platform/win32-x64/bin
          curl -fsSL "${BASE}/a2ald_${VERSION}_windows_amd64.zip" -o /tmp/win.zip
          unzip -j /tmp/win.zip '*/a2ald.exe' -d npm/platform/win32-x64/bin/

      - name: Set versions
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for PKG_DIR in \
            npm/platform/linux-x64 \
            npm/platform/linux-arm64 \
            npm/platform/darwin-x64 \
            npm/platform/darwin-arm64 \
            npm/platform/win32-x64 \
            npm/a2ald; do
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('${PKG_DIR}/package.json', 'utf8'));
              p.version = '${VERSION}';
              if (p.optionalDependencies) {
                for (const k of Object.keys(p.optionalDependencies)) {
                  p.optionalDependencies[k] = '${VERSION}';
                }
              }
              fs.writeFileSync('${PKG_DIR}/package.json', JSON.stringify(p, null, 2) + '\n');
            "
          done

      - name: Publish platform packages
        run: |
          for PLAT in linux-x64 linux-arm64 darwin-x64 darwin-arm64 win32-x64; do
            cd "npm/platform/${PLAT}"
            npm publish --access public
            cd "../../.."
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: |
          cd npm/a2ald
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  gomobile-android:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c
      - name: gomobile bind (android)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          go install tool
          gomobile init
          gomobile bind -target=android -androidapi 21 -ldflags="-checklinkname=0" -o a2al.aar github.com/a2al/a2al/mobile
      - uses: actions/upload-artifact@v4
        with:
          name: a2al-android-aar
          path: a2al.aar
          retention-days: 7

  gomobile-ios:
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: gomobile bind (ios)
        run: |
          go install tool
          gomobile init
          gomobile bind -target=ios -o A2AL.xcframework github.com/a2al/a2al/mobile
      - uses: actions/upload-artifact@v4
        with:
          name: a2al-ios-xcframework
          path: A2AL.xcframework
          retention-days: 7
