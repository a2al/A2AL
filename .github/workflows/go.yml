name: build

on:
  push:
    tags:
      - 'build-*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go test -vet=off -count=1 ./...
        env:
          CGO_ENABLED: "0"

  packages:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --snapshot --clean -f .goreleaser.quick.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: |
            dist/*linux_amd64*
            dist/*.deb
            dist/*.rpm
          retention-days: 7

      - uses: actions/upload-artifact@v4
        with:
          name: darwin-amd64
          path: dist/*darwin_amd64*
          retention-days: 7

      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: dist/*windows_amd64*
          retention-days: 7
