name: go

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go test -vet=off -count=1 ./...
        env:
          CGO_ENABLED: "0"

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64, ext: ""     }
          - { goos: linux,   goarch: arm64, ext: ""     }
          - { goos: darwin,  goarch: amd64, ext: ""     }
          - { goos: darwin,  goarch: arm64, ext: ""     }
          - { goos: windows, goarch: amd64, ext: ".exe" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: build phase1-node
        run: |
          cd examples/phase1-node
          go build -o phase1-node-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} .
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
      - uses: actions/upload-artifact@v4
        with:
          name: phase1-node-${{ matrix.goos }}-${{ matrix.goarch }}
          path: examples/phase1-node/phase1-node-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          retention-days: 7
      - name: build phase2-chat
        run: |
          cd examples/phase2-chat
          go build -o phase2-chat-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} .
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
      - uses: actions/upload-artifact@v4
        with:
          name: phase2-chat-${{ matrix.goos }}-${{ matrix.goarch }}
          path: examples/phase2-chat/phase2-chat-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          retention-days: 7

  cross-build-mobile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: android, goarch: amd64 }
          - { goos: android, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go build ./...
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"

  cross-build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go build ./...
        env:
          GOOS: ios
          GOARCH: arm64
          CGO_ENABLED: "0"
